# ─────────────────────────────────────────────────────────────────────────────
# DEVELOPMENT-ONLY compose file.
# Every credential below is a dummy placeholder for local dev.
# NEVER deploy this file as-is: override via a `docker-compose.override.yml`,
# a `.env` file, or a dedicated prod compose with secrets from a vault.
# ─────────────────────────────────────────────────────────────────────────────
services:
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - database
    environment:
      DATABASE_URL: mysql://app:PLACEHOLDER_DB_PWD@database:3306/nimes_alerie?serverVersion=8.0
      APP_ENV: dev
      # ⚠️  PRODUCTION : remplacer ces valeurs par des secrets forts avant tout déploiement
      APP_SECRET: PLACEHOLDER_APP_SECRET      # ex: php -r "echo bin2hex(random_bytes(16));"
      JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
      JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
      JWT_PASSPHRASE: PLACEHOLDER_JWT_PASS               # clé de déchiffrement de la clé privée JWT
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
      MAILER_DSN: null://null                 # ⚠️  PRODUCTION : smtp://user:pass@host:port
      FRONTEND_URL: http://localhost:4200

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - php

  database:
    image: mysql:8.0
    ports:
      # ⚠️  PRODUCTION : ne pas exposer le port 3306 publiquement — supprimer cette ligne
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: PLACEHOLDER_ROOT_PWD     # ⚠️  PRODUCTION : utiliser un mot de passe fort
      MYSQL_DATABASE: nimes_alerie
      MYSQL_USER: app
      MYSQL_PASSWORD: PLACEHOLDER_DB_PWD        # ⚠️  PRODUCTION : utiliser un mot de passe fort
    volumes:
      - db_data:/var/lib/mysql

  node:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm start"
    ports:
      - "4200:4200"

volumes:
  db_data:
