# ─────────────────────────────────────────────────────────────────────────────
# DEVELOPMENT-ONLY compose file.
# All credentials are read from environment variables (with dev-only defaults).
# Copy `.env.docker.example` to `.env` at the repo root and adjust as needed.
# NEVER deploy this file as-is in production — use a secrets manager.
# ─────────────────────────────────────────────────────────────────────────────
services:
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - database
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD}@database:3306/${MYSQL_DATABASE:-nimes_alerie}?serverVersion=8.0
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
      JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
      MAILER_DSN: ${MAILER_DSN:-null://null}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - php

  database:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nimes_alerie}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  node:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm start"
    ports:
      - "4200:4200"

volumes:
  db_data:
