App\Entity\Article:
  article_arenes:
    name: Les Arènes de Nîmes, joyau de l'Antiquité
    content: |
      Les Arènes de Nîmes sont l'un des amphithéâtres romains les mieux conservés au monde. Construites vers la fin du Ier siècle, elles pouvaient accueillir jusqu'à 24 000 spectateurs.

      Aujourd'hui encore, elles accueillent des spectacles, concerts et corridas, perpétuant une tradition millénaire. L'édifice mesure 133 mètres de long et 101 mètres de large, avec une façade extérieure à deux niveaux de 60 arcades chacun.

      Les Arènes sont le symbole de Nîmes et constituent un incontournable pour tout visiteur de la ville. Elles ont été classées monument historique dès 1840.

  article_brandade:
    name: La brandade de Nîmes, trésor gastronomique
    content: |
      La brandade de Nîmes est le plat emblématique de la cuisine nîmoise. Cette préparation à base de morue effilochée, d'huile d'olive et parfois de pommes de terre, est un véritable patrimoine culinaire.

      Son nom vient du provençal "brandar" qui signifie "remuer". La recette traditionnelle ne contient que de la morue et de l'huile d'olive, travaillées longuement jusqu'à obtenir une émulsion onctueuse.

      Chaque année, la confrérie de la brandade de Nîmes perpétue cette tradition gourmande. On la déguste chaude, en gratin, ou froide sur des toasts en apéritif.

  article_pont:
    name: Le Pont du Gard, chef-d'œuvre d'ingénierie romaine
    content: |
      Le Pont du Gard est un aqueduc romain situé à 25 km de Nîmes. Classé au patrimoine mondial de l'UNESCO, il fait partie de l'aqueduc qui alimentait Nîmes en eau depuis la source d'Eure à Uzès.

      Construit au Ier siècle, il mesure 49 mètres de haut et comporte trois niveaux d'arches. C'est le plus haut pont-aqueduc romain connu. Les blocs de pierre, pesant jusqu'à 6 tonnes, ont été assemblés sans mortier.

      Le site accueille aujourd'hui plus d'un million de visiteurs par an et propose un musée interactif, des sentiers de randonnée et des espaces de baignade en été.

  article_feria:
    name: La Féria de Nîmes, entre tradition et festivités
    content: |
      La Féria de Nîmes est l'un des événements majeurs du sud de la France. Deux fois par an, à la Pentecôte et en septembre, la ville se transforme en capitale de la fête.

      Pendant cinq jours, les rues sont animées par des bodégas, des concerts, des défilés et bien sûr des corridas aux Arènes. Plus d'un million de visiteurs affluent chaque année pour vivre cette ambiance unique.

      La Féria est aussi l'occasion de découvrir la culture taurine, omniprésente dans le Gard. Les abrivados, courses de taureaux dans les rues, sont un spectacle à ne pas manquer.

  article_maison_carree:
    name: La Maison Carrée, temple romain parfaitement conservé
    content: |
      La Maison Carrée est un temple romain du Ier siècle avant J.-C., situé au cœur de Nîmes. C'est l'un des temples romains les mieux préservés au monde.

      Malgré son nom, l'édifice est rectangulaire. Le terme "carrée" signifiait "avec des angles droits" en ancien français. Le temple mesure 26 mètres de long sur 15 mètres de large.

      Inscrite au patrimoine mondial de l'UNESCO depuis 2023, la Maison Carrée abrite aujourd'hui un film immersif retraçant l'histoire de Nemausus, le nom romain de Nîmes.
