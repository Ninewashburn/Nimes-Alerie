name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────
  # Backend — PHP / Symfony
  # ─────────────────────────────────────────────
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-test-root-pwd
          MYSQL_DATABASE: nimes_alerie_test
          MYSQL_USER: app
          MYSQL_PASSWORD: ci-test-db-pwd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: test
      APP_SECRET: ci-test-secret-not-a-real-value
      DATABASE_URL: mysql://root:ci-test-root-pwd@127.0.0.1:3306/nimes_alerie?serverVersion=8.0.32
      JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
      JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
      JWT_PASSPHRASE: ci-test-passphrase
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
      LOCK_DSN: semaphore
      MAILER_DSN: null://null
      FRONTEND_URL: http://localhost:4200

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_mysql, sodium
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -aes256 \
            -pass pass:$JWT_PASSPHRASE -pkeyopt rsa_keygen_bits:2048
          openssl pkey -in config/jwt/private.pem -passin pass:$JWT_PASSPHRASE \
            -out config/jwt/public.pem -pubout

      - name: PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction

      - name: PHPStan Warmup
        run: php bin/console cache:clear --env=dev

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

      - name: PHPUnit
        run: vendor/bin/phpunit --no-coverage

  # ─────────────────────────────────────────────
  # Frontend — Angular
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ['22']

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build -- --configuration production
