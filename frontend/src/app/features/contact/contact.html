<div class="max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold mb-8">Contact</h1>

  @if (sent()) {
    <div class="bg-green-50 text-green-700 p-4 rounded-xl mb-6">
      Votre message a bien été pris en compte. Nous vous répondrons dans les plus brefs délais.
    </div>
  }

  <div class="bg-white rounded-xl shadow-md p-8">
    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" [(ngModel)]="form.email" name="email" required
          class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500"
          placeholder="votre@email.fr" />
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Sujet</label>
        <select [(ngModel)]="form.subject" name="subject"
          class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
          <option value="general">Question générale</option>
          <option value="order">Commande</option>
          <option value="bug">Signaler un bug</option>
          <option value="other">Autre</option>
        </select>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
        <textarea [(ngModel)]="form.message" name="message" required rows="5"
          class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500"
          placeholder="Décrivez votre demande..."></textarea>
      </div>
      <button type="submit" [disabled]="sending()"
        class="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-gray-400 text-white py-3 rounded-lg font-semibold transition">
        @if (sending()) { Envoi en cours... } @else { Envoyer }
      </button>
    </form>
  </div>
</div>
